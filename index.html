    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#07070f;font-family:'DM Mono','Fira Code',monospace;color:#fff;min-height:100vh;overflow-x:hidden}
    
    @keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
    @keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    @keyframes grow{from{width:0%}to{width:var(--w)}}
    @keyframes floatUp{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-40px);opacity:0}}
    @keyframes glow{0%,100%{box-shadow:0 0 20px #38bdf822}50%{box-shadow:0 0 40px #38bdf844}}

    .card{background:#0d0d1a;border:1px solid #1a1a2e;border-radius:16px;padding:20px;margin-bottom:14px;animation:slideUp 0.3s ease both}
    
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:2px}

    /* Grain overlay */
    body::before{content:"";position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:0.4}

    /* Interest particles */
    .particle{position:absolute;pointer-events:none;font-size:11px;color:#4ade80;font-family:'DM Mono';animation:floatUp 1.5s ease forwards;font-weight:500}

    /* Versus battle bar */
    .versus-bar{position:relative;height:20px;border-radius:10px;overflow:hidden;background:#111}
    .versus-tim{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,#1e7ab8,#38bdf8);border-radius:10px 0 0 10px;transition:width 1s cubic-bezier(.4,0,.2,1)}
    .versus-lena{position:absolute;right:0;top:0;height:100%;background:linear-gradient(90deg,#f472b6,#e879f9);border-radius:0 10px 10px 0;transition:width 1s cubic-bezier(.4,0,.2,1)}
    .versus-divider{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#07070f;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:9px;z-index:2;border:1px solid #2a2a4a}

    /* Interest meter */
    .interest-ring{position:relative;display:inline-flex;align-items:center;justify-content:center}
    .interest-ring svg{transform:rotate(-90deg)}

    /* Tab active glow */
    .tab-active{position:relative}
    .tab-active::after{content:"";position:absolute;bottom:-2px;left:10%;right:10%;height:2px;border-radius:1px;background:linear-gradient(90deg,#38bdf8,#f472b6)}

    /* Stat card hover */
    .stat-card{transition:border-color 0.2s,transform 0.2s}
    .stat-card:hover{transform:translateY(-2px)}
    
    /* Leader crown animation */
    @keyframes crownBounce{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-4px) rotate(5deg)}}
    .crown{display:inline-block;animation:crownBounce 2s ease-in-out infinite}

    @keyframes pinFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
    @keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(-70px) rotate(360deg);opacity:0}}
    .map-wrap{position:relative;border-radius:12px;overflow:hidden;border:1px solid #1a1a2e}

    .task-box.done{background:#4ade8022;border-color:#4ade8066;color:#4ade80}
    .confetti-piece{position:absolute;pointer-events:none;animation:confetti 1s ease forwards}

const h=(tag,attrs,...kids)=>{
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  for(const c of kids){if(c==null||c===false)continue;e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);}
  return e;
};

function calcVal(deps,asOf=new Date()){
  return deps.reduce((s,d)=>{
    const dd=new Date(d.year,d.month-1,15);
    const m=Math.max(0,(asOf.getFullYear()-dd.getFullYear())*12+(asOf.getMonth()-dd.getMonth()));
    return s+d.amount*Math.pow(1+MR,m);
  },0);
}

function svgLine(data,keys,colors,W=640,H=200,showDots=false){
  const pl=55,pr=10,pt=10,pb=30,cw=W-pl-pr,ch=H-pt-pb;
  const allV=data.flatMap(d=>keys.map(k=>d[k]||0));
  const maxV=Math.max(...allV)*1.05||100;
  const xs=i=>(i/(data.length-1||1))*cw;
  const ys=v=>ch-((v/maxV))*ch;
  const s=document.createElementNS("http://www.w3.org/2000/svg","svg");
  s.setAttribute("width","100%");s.setAttribute("viewBox",`0 0 ${W} ${H}`);
  
  // Grid lines
  for(let i=0;i<=4;i++){
    const y=pt+(ch/4)*i,v=maxV-(maxV/4)*i;
    const l=document.createElementNS("http://www.w3.org/2000/svg","line");
    l.setAttribute("x1",pl);l.setAttribute("x2",pl+cw);l.setAttribute("y1",y);l.setAttribute("y2",y);
    l.setAttribute("stroke","#1a1a2e");l.setAttribute("stroke-dasharray","3,4");s.appendChild(l);
    const t=document.createElementNS("http://www.w3.org/2000/svg","text");
    t.setAttribute("x",pl-4);t.setAttribute("y",y+4);t.setAttribute("text-anchor","end");
    t.setAttribute("fill","#333");t.setAttribute("font-size","9");t.setAttribute("font-family","monospace");
    t.textContent=`€${fmtShort(v)}`;s.appendChild(t);
  }
  
  keys.forEach((k,ki)=>{
    const pts=data.map((d,i)=>({x:pl+xs(i),y:pt+ys(d[k]||0)}));
    
    // Gradient fill
    const gradId=`grad_${ki}_${Math.random().toString(36).slice(2)}`;
    const defs=document.createElementNS("http://www.w3.org/2000/svg","defs");
    const grad=document.createElementNS("http://www.w3.org/2000/svg","linearGradient");
    grad.setAttribute("id",gradId);grad.setAttribute("x1","0");grad.setAttribute("y1","0");grad.setAttribute("x2","0");grad.setAttribute("y2","1");
    const s1=document.createElementNS("http://www.w3.org/2000/svg","stop");
    s1.setAttribute("offset","0%");s1.setAttribute("stop-color",colors[ki]);s1.setAttribute("stop-opacity","0.3");
    const s2=document.createElementNS("http://www.w3.org/2000/svg","stop");
    s2.setAttribute("offset","100%");s2.setAttribute("stop-color",colors[ki]);s2.setAttribute("stop-opacity","0");
    grad.appendChild(s1);grad.appendChild(s2);defs.appendChild(grad);s.appendChild(defs);
    
    const a=document.createElementNS("http://www.w3.org/2000/svg","path");
    let dp=`M ${pts[0].x} ${pt+ch}`;pts.forEach(p=>dp+=` L ${p.x} ${p.y}`);dp+=` L ${pts[pts.length-1].x} ${pt+ch} Z`;
    a.setAttribute("d",dp);a.setAttribute("fill",`url(#${gradId})`);s.appendChild(a);
    
    // Smooth line
    const l2=document.createElementNS("http://www.w3.org/2000/svg","path");
    let lp=`M ${pts[0].x} ${pts[0].y}`;
    for(let i=1;i<pts.length;i++){
      const mx=(pts[i-1].x+pts[i].x)/2;
      lp+=` C ${mx} ${pts[i-1].y}, ${mx} ${pts[i].y}, ${pts[i].x} ${pts[i].y}`;
    }
    l2.setAttribute("d",lp);l2.setAttribute("fill","none");l2.setAttribute("stroke",colors[ki]);l2.setAttribute("stroke-width","2.5");l2.setAttribute("stroke-linecap","round");s.appendChild(l2);
    
    // End dot
    if(pts.length>0){
      const last=pts[pts.length-1];
      const dot=document.createElementNS("http://www.w3.org/2000/svg","circle");
      dot.setAttribute("cx",last.x);dot.setAttribute("cy",last.y);dot.setAttribute("r","4");
      dot.setAttribute("fill",colors[ki]);dot.setAttribute("stroke","#07070f");dot.setAttribute("stroke-width","2");s.appendChild(dot);
    }
  });
  
  const step=Math.ceil(data.length/5);
  data.forEach((d,i)=>{
    if(i%step!==0&&i!==data.length-1)return;
    const t=document.createElementNS("http://www.w3.org/2000/svg","text");
    t.setAttribute("x",pl+xs(i));t.setAttribute("y",H-8);t.setAttribute("text-anchor","middle");
    t.setAttribute("fill","#333");t.setAttribute("font-size","9");t.setAttribute("font-family","monospace");
    t.textContent=d.label;s.appendChild(t);
  });
  return s;
}

function svgBar(data,keys,colors,W=640,H=130){
  const pl=45,pr=10,pt=10,pb=30,cw=W-pl-pr,ch=H-pt-pb;
  const allV=data.flatMap(d=>keys.map(k=>d[k]||0));
  const maxV=Math.max(...allV)*1.1||100;
  const bw=(cw/data.length)/(keys.length+1.5);
  const s=document.createElementNS("http://www.w3.org/2000/svg","svg");
  s.setAttribute("width","100%");s.setAttribute("viewBox",`0 0 ${W} ${H}`);
  const bl=document.createElementNS("http://www.w3.org/2000/svg","line");
  bl.setAttribute("x1",pl);bl.setAttribute("x2",pl+cw);bl.setAttribute("y1",pt+ch);bl.setAttribute("y2",pt+ch);
  bl.setAttribute("stroke","#1a1a2e");s.appendChild(bl);
  data.forEach((d,i)=>{
    const gx=pl+(cw/data.length)*i+bw*0.5;
    keys.forEach((k,ki)=>{
      const v=d[k]||0,bh=(v/maxV)*ch;
      const gradId=`bg_${ki}_${i}`;
      const defs=document.createElementNS("http://www.w3.org/2000/svg","defs");
      const grad=document.createElementNS("http://www.w3.org/2000/svg","linearGradient");
      grad.setAttribute("id",gradId);grad.setAttribute("x1","0");grad.setAttribute("y1","0");grad.setAttribute("x2","0");grad.setAttribute("y2","1");
      const s1=document.createElementNS("http://www.w3.org/2000/svg","stop");s1.setAttribute("offset","0%");s1.setAttribute("stop-color",colors[ki]);s1.setAttribute("stop-opacity","0.9");
      const s2=document.createElementNS("http://www.w3.org/2000/svg","stop");s2.setAttribute("offset","100%");s2.setAttribute("stop-color",colors[ki]);s2.setAttribute("stop-opacity","0.4");
      grad.appendChild(s1);grad.appendChild(s2);defs.appendChild(grad);s.appendChild(defs);
      const r=document.createElementNS("http://www.w3.org/2000/svg","rect");
      r.setAttribute("x",gx+ki*(bw+2));r.setAttribute("y",pt+ch-bh);
      r.setAttribute("width",bw);r.setAttribute("height",bh||0);
      r.setAttribute("fill",`url(#${gradId})`);r.setAttribute("rx","3");s.appendChild(r);
    });
    const t=document.createElementNS("http://www.w3.org/2000/svg","text");
    t.setAttribute("x",gx+(bw+1));t.setAttribute("y",H-8);t.setAttribute("text-anchor","middle");
    t.setAttribute("fill","#333");t.setAttribute("font-size","9");t.setAttribute("font-family","monospace");
    t.textContent=d.label;s.appendChild(t);
  });
  return s;
}

async function loadGoals(){
  const remote=await sbGoals.all();
  if(remote&&remote.length>0){goals=remote.map(g=>({...g,tasks:JSON.parse(g.tasks||"[]"),tasksDone:JSON.parse(g.tasksDone||"[]")}));}
  else{goals=[...DEFAULT_GOALS];for(const g of goals){const gs={...g,tasks:JSON.stringify(g.tasks),tasksDone:JSON.stringify(g.tasksDone)};await sbGoals.save(gs);}}
}

function isUnlocked(g,total){
  const budgetOk=total>=g.budget;
  const tasksOk=g.tasks.every(t=>g.tasksDone.includes(t));
  return budgetOk&&tasksOk;
}

async function toggleTask(goalId,task,total){
  const g=goals.find(x=>x.id===goalId);if(!g)return;
  if(g.tasksDone.includes(task))g.tasksDone=g.tasksDone.filter(t=>t!==task);
  else g.tasksDone=[...g.tasksDone,task];
  g.unlocked=isUnlocked(g,total);
  await sbGoals.save({...g,tasks:JSON.stringify(g.tasks),tasksDone:JSON.stringify(g.tasksDone)});
  if(g.unlocked)spawnConfetti();
  render();
}

function renderInterestRing(interest,totDep){
  const size=120;
  const r=46;
  const circ=2*Math.PI*r;
  const pct=totDep>0?Math.min(interest/totDep,1):0;
  const dash=pct*circ;
  
  const wrap=h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:"6px"}});
  const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("width",size);svg.setAttribute("height",size);svg.setAttribute("viewBox",`0 0 ${size} ${size}`);
  
  // Background ring
  const bg=document.createElementNS("http://www.w3.org/2000/svg","circle");
  bg.setAttribute("cx",size/2);bg.setAttribute("cy",size/2);bg.setAttribute("r",r);
  bg.setAttribute("fill","none");bg.setAttribute("stroke","#1a1a2e");bg.setAttribute("stroke-width","8");svg.appendChild(bg);
  
  // Glow ring
  const glow=document.createElementNS("http://www.w3.org/2000/svg","circle");
  glow.setAttribute("cx",size/2);glow.setAttribute("cy",size/2);glow.setAttribute("r",r);
  glow.setAttribute("fill","none");glow.setAttribute("stroke","#4ade8033");glow.setAttribute("stroke-width","12");svg.appendChild(glow);
  
  // Progress ring
  const prog=document.createElementNS("http://www.w3.org/2000/svg","circle");
  prog.setAttribute("cx",size/2);prog.setAttribute("cy",size/2);prog.setAttribute("r",r);
  prog.setAttribute("fill","none");prog.setAttribute("stroke","url(#greenGrad)");prog.setAttribute("stroke-width","8");
  prog.setAttribute("stroke-linecap","round");
  prog.setAttribute("stroke-dasharray",`${dash} ${circ}`);svg.appendChild(prog);
  
  // Gradient for ring
  const defs=document.createElementNS("http://www.w3.org/2000/svg","defs");
  const grad=document.createElementNS("http://www.w3.org/2000/svg","linearGradient");
  grad.setAttribute("id","greenGrad");grad.setAttribute("x1","0");grad.setAttribute("y1","0");grad.setAttribute("x2","1");grad.setAttribute("y2","1");
  const s1=document.createElementNS("http://www.w3.org/2000/svg","stop");s1.setAttribute("offset","0%");s1.setAttribute("stop-color","#4ade80");
  const s2=document.createElementNS("http://www.w3.org/2000/svg","stop");s2.setAttribute("offset","100%");s2.setAttribute("stop-color","#86efac");
  grad.appendChild(s1);grad.appendChild(s2);defs.appendChild(grad);svg.insertBefore(defs,svg.firstChild);
  
  // Center text
  const ct=document.createElementNS("http://www.w3.org/2000/svg","text");

function spawnConfetti(){
  const emojis=["🎉","✨","🌟","💫","🎊","🥳"];
  for(let i=0;i<10;i++){
    setTimeout(()=>{
      const p=document.createElement("div");
      p.className="confetti-piece";
      p.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      p.style.cssText=`position:fixed;left:${10+Math.random()*80}%;top:${20+Math.random()*40}%;font-size:${14+Math.random()*16}px;z-index:9998;pointer-events:none;animation:confetti ${0.8+Math.random()*0.8}s ease forwards`;

let leafletMap=null;

function initOrUpdateMap(goals, total){
  // If map already exists, just update markers
  if(leafletMap){
    leafletMap.eachLayer(l=>{ if(l instanceof L.Marker) leafletMap.removeLayer(l); });
    addMapMarkers(leafletMap, goals, total);
    return;
  }

  leafletMap = L.map('travel-map', {
    center: [20, 15],
    zoom: 2,
    minZoom: 1,
    maxZoom: 10,
    zoomControl: true,
    attributionControl: true,
  });

  // Dark tile layer
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(leafletMap);

  addMapMarkers(leafletMap, goals, total);
}

function addMapMarkers(map, goals, total){
  goals.forEach(g => {
    const unlocked = isUnlocked(g, total);
    const tasksDone = g.tasksDone.length;
    const tasksTotal = g.tasks.length;
    const budgetPct = Math.min(total / g.budget * 100, 100);

    const iconHtml = `<div style="
      width:36px;height:36px;border-radius:50%;
      background:${unlocked ? '#0a1a0a' : '#0d0d1a'};
      border:2px solid ${unlocked ? '#4ade80' : '#2a2a4a'};
      display:flex;align-items:center;justify-content:center;
      font-size:18px;cursor:pointer;
      box-shadow:${unlocked ? '0 0 12px #4ade8066' : '0 2px 8px #00000099'};
      transition:all 0.2s;
      filter:${unlocked ? 'none' : 'grayscale(0.8) brightness(0.6)'}
    ">${unlocked ? g.emoji : '🔒'}</div>`;

    const icon = L.divIcon({
      html: iconHtml,
      className: '',
      iconSize: [36, 36],
      iconAnchor: [18, 18],
      popupAnchor: [0, -22],
    });

    const marker = L.marker([g.lat, g.lng], {icon}).addTo(map);

    const statusColor = unlocked ? '#4ade80' : total >= g.budget ? '#f59e0b' : '#555';
    const statusText = unlocked ? '✅ FREIGESCHALTET' : total >= g.budget ? '⏳ Fast geschafft!' : '🔒 Gesperrt';

    marker.bindPopup(`
      <div style="min-width:160px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="font-size:22px">${g.emoji}</span>
          <div>
            <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;line-height:1">${g.name}</div>
            <div style="color:${statusColor};font-size:10px;letter-spacing:0.1em">${statusText}</div>
          </div>
        </div>
        <div style="color:#555;font-size:10px;margin-bottom:4px">💰 SPARZIEL</div>
        <div style="height:4px;background:#111;border-radius:2px;margin-bottom:4px;overflow:hidden">
          <div style="height:100%;width:${budgetPct}%;background:${total>=g.budget?'#4ade80':'#38bdf8'};border-radius:2px"></div>
        </div>
        <div style="color:#888;font-size:11px;margin-bottom:8px">€${total.toFixed(0)} / €${g.budget.toLocaleString('de-DE')}</div>
        <div style="color:#555;font-size:10px;margin-bottom:4px">📋 AUFGABEN ${tasksDone}/${tasksTotal}</div>
        ${g.tasks.map(t=>`<div style="color:${g.tasksDone.includes(t)?'#4ade80':'#444'};font-size:11px">${g.tasksDone.includes(t)?'✓':'○'} ${t}</div>`).join('')}
      </div>
    `, {className: 'goal-popup'});
  });
}

      h("div",{style:{color:"#4ade80",fontFamily:"Bebas Neue",fontSize:"56px",lineHeight:"1"}},`+€${fmt(diff)}`),
      h("div",{style:{color:"#4ade8066",fontSize:"11px",marginTop:"8px"}},"mehr mit dem ETF als in der Schublade 🎉")
    ));
    const gg=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"14px"}});
    gg.appendChild(h("div",{style:{background:"linear-gradient(135deg,#050f05,#0a1a0a)",border:"1px solid #4ade8033",borderRadius:"12px",padding:"16px",textAlign:"center"}},h("div",{style:{fontSize:"24px",marginBottom:"6px"}},"📈"),h("div",{style:{color:"#4ade8066",fontSize:"10px",letterSpacing:"0.15em",marginBottom:"4px"}},"XTRACKERS ETF"),h("div",{style:{color:"#4ade80",fontFamily:"Bebas Neue",fontSize:"28px"}},`€${fmt(fw)}`),h("div",{style:{color:"#4ade8055",fontSize:"10px",marginTop:"4px"}},"mit 3.6% p.a.")));
    gg.appendChild(h("div",{style:{background:"linear-gradient(135deg,#12100a,#0d0d1a)",border:"1px solid #f59e0b33",borderRadius:"12px",padding:"16px",textAlign:"center"}},h("div",{style:{fontSize:"24px",marginBottom:"6px"}},"🪣"),h("div",{style:{color:"#f59e0b66",fontSize:"10px",letterSpacing:"0.15em",marginBottom:"4px"}},"SCHUBLADE"),h("div",{style:{color:"#f59e0b",fontFamily:"Bebas Neue",fontSize:"28px"}},`€${fmt(fn)}`),h("div",{style:{color:"#f59e0b55",fontSize:"10px",marginTop:"4px"}},"0% Zinsen")));
    C.appendChild(gg);
    const vc=h("div",{class:"card"});vc.appendChild(h("div",{style:{color:"#333",fontSize:"10px",letterSpacing:"0.2em",marginBottom:"16px"}},"📊 ENTWICKLUNG ÜBER 5 JAHRE"));vc.appendChild(svgLine(cd,["etf","schublade"],["#4ade80","#f59e0b"]));
    vc.appendChild(h("div",{style:{display:"flex",gap:"16px",marginTop:"10px"}},h("span",{style:{color:"#4ade80",fontSize:"11px"}},"● ETF"),h("span",{style:{color:"#f59e0b",fontSize:"11px"}},"● Schublade")));C.appendChild(vc);
    C.appendChild(h("div",{style:{background:"#0a0a12",border:"1px solid #1a1a2e",borderRadius:"12px",padding:"16px",fontSize:"12px",color:"#444",lineHeight:"2"}},
      "💡 ETF-Wert nach 5 Jahren: ",h("span",{style:{color:"#4ade80"}},`€${fmt(fw)}`),h("br"),
      "Schublade nach 5 Jahren: ",h("span",{style:{color:"#f59e0b"}},`€${fmt(fn)}`),h("br"),
      h("span",{style:{color:"#2a2a2a"}},"📌 Inflation nicht eingerechnet — Schublade verliert sogar an Wert!")));
  }

  if(tab==="goals"){
    // Map header
    const mapCard=h("div",{style:{marginBottom:"14px"}});
    mapCard.appendChild(h("div",{style:{color:"#333",fontSize:"10px",letterSpacing:"0.2em",marginBottom:"12px"}},"🗺️ EURE REISEZIELE"));

    // World map — nur anzeigen wenn Formular zu
    if(!showGoalForm){
      const mapWrap=h("div",{class:"map-wrap",style:{marginBottom:"16px"}});
      mapWrap.appendChild(h("div",{id:"travel-map"}));
      mapCard.appendChild(mapWrap);
      setTimeout(()=>initOrUpdateMap(goals,total), 50);
    }

    // Unlocked counter
    const unlockedCount=goals.filter(g=>isUnlocked(g,total)).length;
    mapCard.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}},
      h("div",{style:{color:"#4ade80",fontSize:"12px"}},`✅ ${unlockedCount} von ${goals.length} freigeschaltet`),
      h("button",{class:"btn",style:{background:showGoalForm?"#0d0d1a":"linear-gradient(135deg,#f472b6,#a855f7)",border:showGoalForm?"1px solid #2a2a4a":"none",borderRadius:"8px",color:showGoalForm?"#666":"#fff",padding:"8px 16px",fontSize:"11px",fontWeight:"700"},
        onclick:()=>{showGoalForm=!showGoalForm;if(showGoalForm){newGoalName="";newGoalEmoji="✈️";newGoalBudget=500;newGoalLat=20;newGoalLng=15;}render()}},showGoalForm?"✕ ABBRECHEN":"+ ZIEL HINZUFÜGEN")
    ));

    // Add goal form
    if(showGoalForm){
      const emojiOpts=["✈️","🗾","🏝️","🌋","🗽","🌞","🏔️","🏙️","🎭","🍜","🎿","🌊"];

      const ngf=h("div",{style:{background:"#0a0a12",border:"1px solid #2a2a4a",borderRadius:"12px",padding:"16px",marginBottom:"12px",animation:"slideUp 0.2s ease"}});
      ngf.appendChild(h("div",{style:{color:"#444",fontSize:"10px",letterSpacing:"0.15em",marginBottom:"12px"}},"✨ NEUES ZIEL"));

      // Name input + search status
      const searchStatus=h("div",{style:{color:"#555",fontSize:"10px",marginTop:"4px",minHeight:"14px"}});
      const ngi=h("input",{type:"text",value:newGoalName,placeholder:"z.B. Tokyo, Malediven, Paris...",style:{width:"100%",background:"#111",border:"1px solid #2a2a4a",borderRadius:"8px",color:"#fff",padding:"9px 12px",fontSize:"13px"}});
      ngf.appendChild(h("div",{style:{marginBottom:"4px"}},h("div",{style:{color:"#333",fontSize:"10px",marginBottom:"5px"}},"NAME — tippe einen Ort ein 🔍"),ngi,searchStatus));

      const nbb=h("input",{type:"number",value:newGoalBudget,placeholder:"500",style:{width:"100%",background:"#111",border:"1px solid #2a2a4a",borderRadius:"8px",color:"#fff",padding:"9px 12px",fontSize:"13px"},oninput:e=>newGoalBudget=parseInt(e.target.value)||0});
      ngf.appendChild(h("div",{style:{marginBottom:"10px"}},h("div",{style:{color:"#333",fontSize:"10px",marginBottom:"5px"}},"EMOJI"),
        h("div",{style:{display:"flex",gap:"6px",flexWrap:"wrap"}},
          ...emojiOpts.map(e=>h("button",{class:"btn",style:{width:"34px",height:"34px",borderRadius:"8px",fontSize:"16px",background:newGoalEmoji===e?"#2a1a3a":"#111",border:`1px solid ${newGoalEmoji===e?"#a855f7":"#2a2a4a"}`},onclick:()=>{newGoalEmoji=e;render()}},e))
        )
      ));
      ngf.appendChild(h("div",{style:{marginBottom:"12px"}},h("div",{style:{color:"#333",fontSize:"10px",marginBottom:"5px"}},"SPARZIEL (€)"),nbb));

      // Location picker map
      const locInfo=h("div",{style:{color:"#555",fontSize:"11px",marginBottom:"8px",minHeight:"16px"}},"Tippe einen Namen ein oder klick auf die Karte");
      const pickerWrap=h("div",{id:"picker-map",style:{height:"220px",borderRadius:"8px",border:"1px solid #2a2a4a",marginBottom:"12px",overflow:"hidden"}});
      ngf.appendChild(h("div",{style:{color:"#333",fontSize:"10px",marginBottom:"5px"}},"📍 ORT"));
      ngf.appendChild(locInfo);
      ngf.appendChild(pickerWrap);

      ngf.appendChild(h("button",{class:"btn",style:{width:"100%",background:"linear-gradient(135deg,#a855f7,#7c3aed)",borderRadius:"10px",color:"#fff",padding:"12px",fontSize:"13px",fontWeight:"700"},
        onclick:async()=>{
          if(!newGoalName.trim())return;
          const ng={id:uid(),name:newGoalName.trim(),emoji:newGoalEmoji,budget:newGoalBudget,lat:newGoalLat,lng:newGoalLng,tasks:["Flüge buchen","Hotel buchen"],unlocked:false,tasksDone:[]};
          goals.push(ng);
          await sbGoals.save({...ng,tasks:JSON.stringify(ng.tasks),tasksDone:JSON.stringify(ng.tasksDone)});
          newGoalName="";newGoalLat=20;newGoalLng=15;showGoalForm=false;render();
        }},"💾 ZIEL SPEICHERN"));
      mapCard.appendChild(ngf);

      // Init picker map + wire up search
      setTimeout(()=>{
        if(!document.getElementById("picker-map"))return;
        const pm=L.map("picker-map",{center:[20,15],zoom:2,zoomControl:true,attributionControl:false});
        L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{subdomains:"abcd",maxZoom:19}).addTo(pm);
        let pickerMarker=null;

        const placeMarker=(lat,lng,label)=>{
          if(pickerMarker)pm.removeLayer(pickerMarker);
          pickerMarker=L.marker([lat,lng],{icon:L.divIcon({html:`<div style="font-size:22px;filter:drop-shadow(0 2px 6px #00000088)">${newGoalEmoji}</div>`,className:"",iconSize:[28,28],iconAnchor:[14,14]})}).addTo(pm);
          pm.flyTo([lat,lng],6,{duration:1.2});
          locInfo.textContent=`✓ ${label} (${(+lat).toFixed(2)}, ${(+lng).toFixed(2)})`;
          locInfo.style.color="#a855f7";
        };

        // Forward geocode when user types (debounced)
        let searchTimer=null;
        ngi.addEventListener("input",e=>{
          newGoalName=e.target.value;
          clearTimeout(searchTimer);
          if(e.target.value.length<2){searchStatus.textContent="";return;}
          searchStatus.textContent="🔍 Suche...";
          searchStatus.style.color="#555";
          searchTimer=setTimeout(async()=>{
            try{
              const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(e.target.value)}&format=json&limit=1&accept-language=de`);
              const d=await r.json();
              if(d&&d[0]){
                newGoalLat=+parseFloat(d[0].lat).toFixed(5);
                newGoalLng=+parseFloat(d[0].lon).toFixed(5);
                placeMarker(newGoalLat,newGoalLng,e.target.value);
                searchStatus.textContent="✓ Gefunden";
                searchStatus.style.color="#4ade80";
              } else {
                searchStatus.textContent="❓ Nicht gefunden";
                searchStatus.style.color="#f59e0b";
              }
            }catch(err){searchStatus.textContent="";}
          },600);
        });

        // Click on map → reverse geocode
        pm.on("click",async e=>{
          const {lat,lng}=e.latlng;
          newGoalLat=+lat.toFixed(5);newGoalLng=+lng.toFixed(5);
          placeMarker(lat,lng,"...");
          locInfo.textContent="📍 Lade Ortsname...";
          locInfo.style.color="#555";
          try{
            const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=de`);
            const d=await r.json();
            const place=d.address?.city||d.address?.town||d.address?.village||d.address?.county||d.address?.state||d.address?.country||"";
            if(ngi.value===""){ngi.value=place;newGoalName=place;ngi.style.borderColor="#a855f7";setTimeout(()=>{ngi.style.borderColor="#2a2a4a";},1000);}
            locInfo.textContent=`✓ ${place||"Ort gewählt"} (${newGoalLat.toFixed(2)}, ${newGoalLng.toFixed(2)})`;
            locInfo.style.color="#a855f7";
          }catch(err){}
        });
      },60);
    }

    C.appendChild(mapCard);

    // Goal cards
    [...goals].sort((a,b)=>{const au=isUnlocked(a,total),bu=isUnlocked(b,total);if(au!==bu)return au?-1:1;return a.budget-b.budget;}).forEach(g=>{
      const unlocked=isUnlocked(g,total);
      const budgetOk=total>=g.budget;
      const allTasksDone=g.tasks.every(t=>g.tasksDone.includes(t));
      const tasksDonePct=g.tasks.length>0?g.tasksDone.length/g.tasks.length:0;

      const card=h("div",{class:`goal-card${unlocked?" unlocked":" locked-card"}`});

      // Header row
      const hRow=h("div",{style:{display:"flex",alignItems:"center",gap:"12px",marginBottom:"12px"}});
      hRow.appendChild(h("div",{style:{fontSize:"28px",lineHeight:"1",filter:unlocked?"none":"grayscale(1) opacity(0.4)"}},g.emoji));
      const titleCol=h("div",{style:{flex:"1"}});
      titleCol.appendChild(h("div",{style:{fontFamily:"Bebas Neue",fontSize:"20px",color:unlocked?"#4ade80":"#fff",lineHeight:"1"}},g.name));
      titleCol.appendChild(h("div",{style:{color:"#333",fontSize:"10px",marginTop:"2px"}},`Sparziel: €${g.budget.toLocaleString("de-DE")}`));
      hRow.appendChild(titleCol);
      if(unlocked)hRow.appendChild(h("div",{style:{background:"#4ade8022",border:"1px solid #4ade8044",borderRadius:"20px",padding:"4px 10px",color:"#4ade80",fontSize:"10px",fontWeight:"700",letterSpacing:"0.1em"}},"✅ FREI"));
      else hRow.appendChild(h("div",{style:{background:"#1a0d0d",border:"1px solid #ff444422",borderRadius:"20px",padding:"4px 10px",color:"#ff444488",fontSize:"10px",letterSpacing:"0.1em"}},"🔒 GESPERRT"));
      card.appendChild(hRow);

      // Budget progress
      const bPct=Math.min(total/g.budget*100,100);
      card.appendChild(h("div",{style:{marginBottom:"10px"}},
        h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"4px"}},
          h("span",{style:{color:"#333",fontSize:"10px"}},"💰 SPARTOPF"),
          h("span",{style:{color:budgetOk?"#4ade80":"#f59e0b",fontSize:"10px"}},(budgetOk?"✅ ":"")+`€${fmt(total)} / €${g.budget.toLocaleString("de-DE")}`)
        ),
        h("div",{style:{height:"5px",background:"#111",borderRadius:"3px",overflow:"hidden"}},
          h("div",{style:{height:"100%",width:`${bPct}%`,background:budgetOk?"#4ade80":"linear-gradient(90deg,#38bdf8,#a855f7)",borderRadius:"3px",transition:"width 0.6s ease"}})
        )
      ));

      // Tasks
      if(g.tasks.length){
        card.appendChild(h("div",{style:{color:"#333",fontSize:"10px",letterSpacing:"0.1em",marginBottom:"6px"}},`📋 AUFGABEN (${g.tasksDone.length}/${g.tasks.length})`));
        const tList=h("div",{style:{display:"flex",flexDirection:"column"}});
        g.tasks.forEach(task=>{
          const done=g.tasksDone.includes(task);
          const row=h("div",{class:"task-row",onclick:()=>toggleTask(g.id,task,total)});
          row.appendChild(h("div",{class:`task-box${done?" done":""}`},done?"✓":""));
          row.appendChild(h("div",{style:{fontSize:"12px",color:done?"#4ade80":"#888",textDecoration:done?"line-through":"none",flex:"1"}},task));
          tList.appendChild(row);
        });
        card.appendChild(tList);
      }

      // Delete btn
      card.appendChild(h("div",{style:{marginTop:"10px",textAlign:"right"}},
        h("button",{class:"btn",style:{background:"#150505",borderRadius:"6px",color:"#ff6666",padding:"4px 9px",fontSize:"10px"},onclick:()=>{goalDeleteId=g.id;render()}},"🗑️")
      ));

      C.appendChild(card);
    });
  }


  if(tab==="history"){
    if(!deps.length)C.appendChild(h("div",{style:{textAlign:"center",padding:"50px",color:"#222"}},h("div",{style:{fontFamily:"Bebas Neue",fontSize:"20px"}},"NOCH KEINE EINZAHLUNGEN")));
    else{const list=h("div",{style:{display:"flex",flexDirection:"column",gap:"8px"}});
      [...deps].sort((a,b)=>b.year!==a.year?b.year-a.year:b.month-a.month).forEach(d=>{
        list.appendChild(h("div",{style:{background:"#0a0a12",border:`1px solid ${COL[d.person]}18`,borderLeft:`3px solid ${COL[d.person]}`,borderRadius:"10px",padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"8px"}},
          h("div",{style:{display:"flex",gap:"12px",alignItems:"center",flexWrap:"wrap"}},
            h("span",{style:{color:COL[d.person],fontFamily:"Bebas Neue",fontSize:"16px"}},d.person),
            h("span",{style:{color:"#2a2a4a",fontSize:"11px"}},`${MO[d.month-1]} ${d.year}`),
            d.note?h("span",{style:{color:"#2a2a4a",fontSize:"11px"}},`· ${d.note}`):null
          ),
          h("div",{style:{display:"flex",gap:"12px",alignItems:"center"}},
            h("span",{style:{color:"#fff",fontFamily:"Bebas Neue",fontSize:"20px"}},`€${fmt(d.amount)}`),
            h("button",{class:"btn",style:{background:"#150505",borderRadius:"6px",color:"#ff6666",padding:"4px 9px",fontSize:"11px"},onclick:()=>{delId=d.id;render()}},"🗑️"))
        ));});C.appendChild(list);}
  }

  app.appendChild(C);

  if(goalDeleteId){
    app.appendChild(h("div",{style:{position:"fixed",inset:"0",background:"#00000099",display:"flex",alignItems:"center",justifyContent:"center",zIndex:"100",backdropFilter:"blur(4px)"}},
      h("div",{style:{background:"#0d0d1a",border:"1px solid #ff444433",borderRadius:"18px",padding:"32px",maxWidth:"300px",width:"90%",textAlign:"center",animation:"slideUp 0.2s ease"}},
        h("div",{style:{fontSize:"32px",marginBottom:"12px"}},"🗺️"),
        h("div",{style:{color:"#fff",fontFamily:"Bebas Neue",fontSize:"22px",marginBottom:"8px"}},"ZIEL LÖSCHEN?"),
        h("div",{style:{color:"#444",fontSize:"12px",marginBottom:"22px"}},"Das Ziel wird für beide gelöscht."),
        h("div",{style:{display:"flex",gap:"10px"}},
          h("button",{class:"btn",style:{flex:"1",background:"#1a1a2e",borderRadius:"10px",color:"#666",padding:"12px"},onclick:()=>{goalDeleteId=null;render()}},"NEIN"),
          h("button",{class:"btn",style:{flex:"1",background:"#ff4444",borderRadius:"10px",color:"#fff",padding:"12px",fontWeight:"700"},onclick:async()=>{
            await sbGoals.del(goalDeleteId);goals=goals.filter(g=>g.id!==goalDeleteId);goalDeleteId=null;render();
          }},"LÖSCHEN"))
      )));
  }

  if(delId){
    app.appendChild(h("div",{style:{position:"fixed",inset:"0",background:"#00000099",display:"flex",alignItems:"center",justifyContent:"center",zIndex:"100",backdropFilter:"blur(4px)"}},
      h("div",{style:{background:"#0d0d1a",border:"1px solid #ff444433",borderRadius:"18px",padding:"32px",maxWidth:"300px",width:"90%",textAlign:"center",animation:"slideUp 0.2s ease"}},
        h("div",{style:{fontSize:"32px",marginBottom:"12px"}},"🗑️"),
        h("div",{style:{color:"#fff",fontFamily:"Bebas Neue",fontSize:"22px",marginBottom:"8px"}},"LÖSCHEN?"),
        h("div",{style:{color:"#444",fontSize:"12px",marginBottom:"22px"}},"Wird bei beiden gelöscht."),
        h("div",{style:{display:"flex",gap:"10px"}},
          h("button",{class:"btn",style:{flex:"1",background:"#1a1a2e",borderRadius:"10px",color:"#666",padding:"12px"},onclick:()=>{delId=null;render()}},"NEIN"),
          h("button",{class:"btn",style:{flex:"1",background:"#ff4444",borderRadius:"10px",color:"#fff",padding:"12px",fontWeight:"700"},onclick:async()=>{await sb.del(delId);deps=deps.filter(d=>d.id!==delId);delId=null;render()}},"LÖSCHEN"))
      )));
  }
}

Promise.all([sb.all(),loadGoals()]).then(([d])=>{deps=d||[];loading=false;render();});
</script>
