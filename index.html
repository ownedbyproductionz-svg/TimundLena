<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tim & Lena — Sparplan</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root {
  --bg:#0e0e11; --bg1:#141417; --bg2:#1a1a1f; --bg3:#202027;
  --line:#2a2a35; --line2:#353545;
  --tim:#5b8dee; --lena:#e8608a; --green:#3ecf8e; --amber:#f0b429; --red:#f06060;
  --text:#f0f0f5; --muted:#6b6b80; --faint:#1e1e26;
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}
.wrap{max-width:780px;margin:0 auto;padding:32px 20px 100px}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(-80px) rotate(500deg);opacity:0}}

/* HEADER */
.header{margin-bottom:28px;animation:fadeUp .4s ease both}
.header-row{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap}
.logo{font-family:'Syne',sans-serif;font-size:clamp(32px,6vw,52px);font-weight:800;letter-spacing:-.03em;line-height:1}
.logo .t{color:var(--tim)}
.logo .amp{color:var(--line2);margin:0 6px;font-weight:700}
.logo .l{color:var(--lena)}
.header-meta{display:flex;gap:14px;flex-wrap:wrap;margin-top:6px;font-size:12px;color:var(--muted)}

/* TICKER */
.ticker{background:var(--bg1);border:1px solid var(--line);border-radius:var(--r);padding:9px 0;overflow:hidden;margin-bottom:18px;display:flex}
.ticker-inner{display:inline-flex;animation:marquee 28s linear infinite;white-space:nowrap}
.ti{padding:0 18px;font-size:11px;font-weight:500;color:var(--muted);border-right:1px solid var(--line)}
.ti.up{color:var(--green)}
.ti.dn{color:var(--red)}

/* CARD */
.card{background:var(--bg1);border:1px solid var(--line);border-radius:var(--r);padding:20px}

/* LABEL */
.label{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}

/* HERO */
.hero{background:var(--bg1);border:1px solid var(--line);border-radius:var(--r);padding:26px;margin-bottom:10px;animation:fadeUp .35s ease both;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 70% 80% at 0 50%,rgba(91,141,238,.05),transparent);pointer-events:none}
.hero-amount{font-family:'Syne',sans-serif;font-size:clamp(38px,7vw,60px);font-weight:800;letter-spacing:-.03em;line-height:1;margin-bottom:5px}
.hero-sub{font-size:13px;color:var(--muted);margin-bottom:16px}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px}
.prog-track{height:6px;background:var(--bg3);border-radius:99px;overflow:hidden;position:relative}
.prog-t{position:absolute;left:0;top:0;height:100%;background:var(--tim);border-radius:99px;transition:width 1s ease}
.prog-l{position:absolute;top:0;height:100%;background:var(--lena);border-radius:99px;transition:width 1s ease,left 1s ease}

/* TIMELINE */
.tl-card{background:var(--bg1);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:10px;animation:fadeUp .35s ease .04s both}
.tl-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.tl-track{height:18px;background:var(--bg3);border-radius:4px;position:relative;overflow:visible;margin-bottom:8px}
.tl-fill{position:absolute;left:0;top:0;height:100%;background:rgba(91,141,238,.15);border-radius:4px;transition:width 1.2s ease}
.tl-now{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--green);border-radius:1px;box-shadow:0 0 6px var(--green)}
.tl-now-lbl{position:absolute;top:-17px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:600;color:var(--green);white-space:nowrap}
.tl-dot{position:absolute;top:50%;width:8px;height:8px;border-radius:50%;border:1.5px solid var(--bg);transform:translate(-50%,-50%);cursor:default}
.tl-years{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);font-weight:500}

/* COUNTDOWN */
.cd-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.cd-cell{background:var(--bg1);border:1px solid var(--line);border-radius:var(--r);padding:14px 6px;text-align:center;animation:fadeUp .35s ease .07s both}
.cd-num{font-family:'Syne',sans-serif;font-size:clamp(24px,5vw,38px);font-weight:800;letter-spacing:-.02em;line-height:1;margin-bottom:3px}
.cd-lbl{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.07em;text-transform:uppercase}

/* ADD BTN */
.add-btn{width:100%;padding:12px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .18s;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:7px}
.add-btn:hover{background:var(--bg3)}
.add-btn.open{color:var(--muted)}

/* FORM */
.form-card{background:var(--bg1);border:1px solid var(--line2);border-top:2px solid var(--tim);border-radius:var(--r);padding:22px;margin-bottom:10px;animation:fadeUp .2s ease both}
.person-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.p-btn{padding:11px;background:var(--bg2);border:1px solid var(--line);border-radius:8px;color:var(--muted);font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .18s}
.p-btn.at{background:rgba(91,141,238,.1);color:var(--tim);border-color:rgba(91,141,238,.4)}
.p-btn.al{background:rgba(232,96,138,.1);color:var(--lena);border-color:rgba(232,96,138,.4)}
.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:9px}
.ff label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;letter-spacing:.04em;text-transform:uppercase}
.ff input,.ff select,.ff textarea{width:100%;padding:8px 11px;background:var(--bg2);border:1px solid var(--line2);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color .18s;-webkit-appearance:none}
.ff input:focus,.ff select:focus{border-color:var(--tim)}
.ff select option{background:var(--bg2)}
.save-btn{width:100%;padding:11px;border:none;border-radius:8px;color:#fff;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .18s}
.save-btn:hover{opacity:.9}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
.stat-cell{background:var(--bg1);border:1px solid var(--line);border-radius:var(--r);padding:15px 17px;animation:fadeUp .35s ease .1s both}
.stat-val{font-family:'Syne',sans-serif;font-size:clamp(19px,3vw,25px);font-weight:800;letter-spacing:-.02em;margin-top:2px;line-height:1.1}
.stat-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* BATTLE */
.battle{background:var(--bg1);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin-bottom:10px;animation:fadeUp .35s ease .12s both}
.battle-inner{display:grid;grid-template-columns:1fr auto 1fr}
.bp{padding:18px}
.bp.r{text-align:right}
.bp-name{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.bp-val{font-family:'Syne',sans-serif;font-size:clamp(22px,4vw,34px);font-weight:800;letter-spacing:-.02em;line-height:1}
.bp-dep{font-size:11px;color:var(--muted);margin-top:3px}
.bp-vs{padding:18px 14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border-left:1px solid var(--line);border-right:1px solid var(--line)}
.vs-lbl{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.1em}
.battle-bar{display:flex;height:3px}
.bb-t{height:100%;background:var(--tim);transition:width 1s ease}
.bb-l{height:100%;background:var(--lena);transition:width 1s ease;margin-left:auto}
.battle-foot{padding:7px 18px;background:var(--bg2);font-size:11px;color:var(--muted);text-align:center;border-top:1px solid var(--line)}

/* STREAK */
.streak{display:grid;grid-template-columns:100px 1fr;background:var(--bg1);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin-bottom:10px;animation:fadeUp .35s ease .13s both}
.streak-l{background:var(--bg2);border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 8px;text-align:center}
.streak-num{font-family:'Syne',sans-serif;font-size:40px;font-weight:800;line-height:1;color:var(--amber)}
.streak-lbl{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-top:3px}
.streak-r{padding:16px 18px}
.streak-tag{display:inline-block;font-size:10px;font-weight:600;color:var(--muted);background:var(--bg2);border:1px solid var(--line);border-radius:6px;padding:2px 8px;margin-bottom:8px;letter-spacing:.05em;text-transform:uppercase}
.roast{font-size:13px;color:var(--text);line-height:1.65;font-style:italic}

/* KAUFEN */
.kaufen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.k-cell{background:var(--bg1);border:1px solid var(--line);border-radius:var(--r);padding:14px;transition:border-color .18s}
.k-cell:hover{border-color:var(--line2)}
.k-emoji{font-size:18px;margin-bottom:5px}
.k-name{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px}
.k-count{font-family:'Syne',sans-serif;font-size:clamp(18px,3vw,24px);font-weight:800;letter-spacing:-.02em;line-height:1}
.k-bar{height:2px;background:var(--bg3);border-radius:99px;margin:7px 0 4px;overflow:hidden}
.k-bar-fill{height:100%;border-radius:99px;transition:width 1s ease}
.k-funny{font-size:10px;color:var(--muted);font-style:italic;line-height:1.4}

/* TABS */
.tab-nav{display:flex;gap:2px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);padding:4px;margin-bottom:8px;overflow-x:auto}
.tab-nav::-webkit-scrollbar{height:0}
.tab-btn{flex:1;min-width:78px;padding:8px 8px;border-radius:8px;background:transparent;border:none;color:var(--muted);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .18s}
.tab-btn:hover{color:var(--text);background:var(--bg3)}
.tab-btn.active{background:var(--bg3);color:var(--text);font-weight:600}
.tab-content{background:var(--bg1);border:1px solid var(--line);border-radius:var(--r);padding:22px;min-height:180px;margin-bottom:10px;animation:fadeUp .2s ease both}

/* SEC HEAD */
.sec-head{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin:0 0 12px;display:flex;align-items:center;gap:10px}
.sec-head::after{content:"";flex:1;height:1px;background:var(--line)}

/* CHART LEGEND */
.leg{display:flex;gap:14px;margin-top:10px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:var(--muted)}
.leg-dot{width:8px;height:8px;border-radius:50%}

/* SLIDER */
.sl-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.sl-lbl{font-size:12px;color:var(--muted);font-weight:500}
.sl-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--tim);letter-spacing:-.02em}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:var(--bg3);border-radius:99px;cursor:pointer;outline:none;margin-bottom:18px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--text);border:2px solid var(--bg);cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.4)}

/* ETF VS */
.vs-hero{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);padding:26px;text-align:center;margin-bottom:10px}
.vs-num{font-family:'Syne',sans-serif;font-size:clamp(38px,7vw,58px);font-weight:800;letter-spacing:-.03em;color:var(--green);line-height:1}
.vs-sub{font-size:12px;color:var(--muted);margin-top:5px}
.vs-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.vs-cell{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);padding:16px;text-align:center}
.vs-cell-val{font-family:'Syne',sans-serif;font-size:clamp(20px,3.5vw,28px);font-weight:800;letter-spacing:-.02em;line-height:1;margin-top:6px}

/* GOALS */
.map-wrap{border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
#travel-map{height:290px;width:100%}
.leaflet-container{background:#0a0a0e!important}
.leaflet-tile{filter:brightness(.42) saturate(.25) hue-rotate(200deg)!important}
.leaflet-control-zoom a{background:var(--bg1)!important;color:var(--muted)!important;border-color:var(--line)!important}
.leaflet-control-attribution{background:rgba(14,14,17,.9)!important;color:var(--muted)!important;font-size:9px!important}
.goal-popup .leaflet-popup-content-wrapper{background:var(--bg1);border:1px solid var(--line2);border-radius:10px;color:var(--text);font-family:'Inter',sans-serif;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.goal-popup .leaflet-popup-tip{background:var(--bg1)}
.goal-popup .leaflet-popup-content{margin:12px 15px;font-size:12px;line-height:1.7}
.goal-card{background:var(--bg2);border:1px solid var(--line);border-left:3px solid var(--muted);border-radius:var(--r);padding:15px 17px;margin-bottom:8px;transition:transform .18s;position:relative}
.goal-card:hover{transform:translateX(2px)}
.goal-card.unlocked{border-left-color:var(--green)}
.goal-name{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;margin-bottom:2px;letter-spacing:-.01em}
.goal-meta{font-size:11px;color:var(--muted);margin-bottom:8px}
.goal-prog{height:3px;background:var(--bg3);border-radius:99px;overflow:hidden;margin-bottom:9px}
.goal-prog-fill{height:100%;border-radius:99px;transition:width .8s ease}
.task-item{display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer;font-size:12px;transition:opacity .15s;border-bottom:1px solid var(--faint)}
.task-item:last-child{border-bottom:none}
.task-item:hover{opacity:.7}
.task-box{width:15px;height:15px;border:1.5px solid var(--line2);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;transition:all .15s}
.task-box.done{background:rgba(62,207,142,.12);border-color:var(--green);color:var(--green)}
.task-txt.done{text-decoration:line-through;color:var(--muted)}
.unlock-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 7px;background:rgba(62,207,142,.1);border:1px solid rgba(62,207,142,.25);border-radius:6px;color:var(--green);position:absolute;top:13px;right:13px;letter-spacing:.04em;text-transform:uppercase}

/* ACTIVITIES */
.act-top{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);padding:13px 16px;margin-bottom:8px}
.act-pct{font-family:'Syne',sans-serif;font-size:34px;font-weight:800;color:var(--lena);letter-spacing:-.02em}
.picker-card{background:var(--bg2);border:1px solid var(--line);border-top:2px solid var(--lena);border-radius:var(--r);padding:26px;text-align:center;margin-bottom:8px}
.pick-name{font-family:'Syne',sans-serif;font-size:clamp(17px,3vw,24px);font-weight:800;letter-spacing:-.01em;margin-bottom:14px;line-height:1.2}
.act-list{display:flex;flex-direction:column}
.act-item{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--faint);font-size:13px;transition:opacity .15s}
.act-item:last-child{border-bottom:none}
.act-item.done-i{opacity:.35}
.act-idx{font-size:10px;font-weight:600;color:var(--muted);min-width:18px}

/* HISTORY */
.hist-year{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;padding:8px 0 5px;border-bottom:1px solid var(--line);margin-bottom:7px}
.hist-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--faint);flex-wrap:wrap;gap:6px}
.hist-person{font-size:13px;font-weight:600}
.hist-amount{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;letter-spacing:-.01em}

/* BUTTONS */
.btn{cursor:pointer;font-family:'Inter',sans-serif;border:none;transition:all .18s;font-weight:500;border-radius:8px}
.btn:active{transform:scale(.97)}
.btn-pri{background:var(--bg3);color:var(--text);border:1px solid var(--line2);padding:7px 13px;font-size:12px}
.btn-pri:hover{border-color:var(--muted)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--line);padding:7px 13px;font-size:12px}
.btn-ghost:hover{color:var(--text);border-color:var(--line2)}
.btn-green{background:rgba(62,207,142,.1);color:var(--green);border:1px solid rgba(62,207,142,.28);padding:9px 18px;font-size:13px;font-weight:600}
.btn-red{background:rgba(240,96,96,.07);color:var(--red);border:1px solid rgba(240,96,96,.18);padding:4px 9px;font-size:11px}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px);animation:fadeUp .2s ease}
.modal{background:var(--bg1);border:1px solid var(--line2);border-radius:16px;padding:30px;max-width:310px;width:90%;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.5);animation:fadeUp .2s ease}
.modal-icon{font-size:30px;margin-bottom:9px}
.modal-title{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;margin-bottom:5px;letter-spacing:-.01em}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.6}
.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:9px}

/* TOAST */
.toast{position:fixed;bottom:22px;right:18px;background:var(--bg1);color:var(--green);border:1px solid rgba(62,207,142,.28);border-radius:10px;padding:11px 16px;font-size:12px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:999;animation:fadeUp .3s ease}

/* MISC */
.confetti-piece{position:fixed;pointer-events:none;animation:confetti 1.2s ease forwards;z-index:9997}
.loader{width:26px;height:26px;border:2px solid var(--line2);border-top-color:var(--tim);border-radius:50%;animation:spin .8s linear infinite}
.empty{padding:36px;text-align:center;font-size:13px;color:var(--muted)}

@media(max-width:540px){
  .stats-grid{grid-template-columns:1fr 1fr}
  .kaufen-grid{grid-template-columns:1fr 1fr}
  .cd-grid{grid-template-columns:repeat(2,1fr)}
  .form-grid{grid-template-columns:1fr 1fr}
  .battle-inner{grid-template-columns:1fr}
  .bp.r{text-align:left}
  .bp-vs{border:none;border-top:1px solid var(--line);border-bottom:1px solid var(--line);flex-direction:row;padding:8px 14px}
  .streak{grid-template-columns:1fr}
  .streak-l{border-right:none;border-bottom:1px solid var(--line);flex-direction:row;gap:8px;padding:10px 14px;justify-content:flex-start}
}
</style>
</head>

<div id="app"></div>
<script>
const SURL="https://jykyucfvwzjpzdlhadre.supabase.co";
const SKEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5a3l1Y2Z2d3pqcHpkbGhhZHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNzEwODMsImV4cCI6MjA4ODc0NzA4M30.XuV-UwXvqsFgdyMYT_YxOnd5ZGH1m15an14xCcZN5RI";

const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

const h=(tag,attrs,...kids)=>{
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="class")e.className=v;
    else e.setAttribute(k,v);
  }
  kids.flat().forEach(c=>{if(c==null||c===false)return;e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c)});
  return e;
};

function calcVal(deps,asOf=new Date()){return deps.reduce((s,d)=>{const dd=new Date(d.year,d.month-1,15);const m=Math.max(0,(asOf.getFullYear()-dd.getFullYear())*12+(asOf.getMonth()-dd.getMonth()));return s+d.amount*Math.pow(1+MR,m);},0)}
function planPct(){return clamp((new Date()-PLAN_START)/(PLAN_END-PLAN_START),0,1)}
function msLeft(){return Math.max(0,PLAN_END-new Date())}
function countdown(){const ms=msLeft();return{days:Math.floor(ms/86400000),hours:Math.floor(ms%86400000/3600000),minutes:Math.floor(ms%3600000/60000),seconds:Math.floor(ms%60000/1000)}}
function isUnlocked(g,total){return total>=g.budget&&g.tasks.every(t=>g.tasksDone.includes(t))}

function svgLine(data,keys,colors,W=740,H=195){
  const pl=50,pr=12,pt=12,pb=26,cw=W-pl-pr,ch=H-pt-pb;
  const allV=data.flatMap(d=>keys.map(k=>d[k]||0));
  const maxV=Math.max(...allV)*1.1||100;
  const xs=i=>(i/(data.length-1||1))*cw,ys=v=>ch-(v/maxV)*ch;
  const s=document.createElementNS("http://www.w3.org/2000/svg","svg");
  s.setAttribute("width","100%");s.setAttribute("viewBox",`0 0 ${W} ${H}`);
  for(let i=0;i<=4;i++){
    const y=pt+(ch/4)*i,v=maxV-(maxV/4)*i;
    const l=document.createElementNS("http://www.w3.org/2000/svg","line");
    l.setAttribute("x1",pl);l.setAttribute("x2",pl+cw);l.setAttribute("y1",y);l.setAttribute("y2",y);
    l.setAttribute("stroke","#1e1e26");l.setAttribute("stroke-dasharray","2,5");s.appendChild(l);
    const t=document.createElementNS("http://www.w3.org/2000/svg","text");
    t.setAttribute("x",pl-5);t.setAttribute("y",y+4);t.setAttribute("text-anchor","end");
    t.setAttribute("fill","#6b6b80");t.setAttribute("font-size","9");t.setAttribute("font-family","Inter,sans-serif");
    t.textContent=`€${fmtS(v)}`;s.appendChild(t);
  }
  const gy=pt+ys(GOAL);
  if(gy>pt&&gy<pt+ch){
    const gl=document.createElementNS("http://www.w3.org/2000/svg","line");
    gl.setAttribute("x1",pl);gl.setAttribute("x2",pl+cw);gl.setAttribute("y1",gy);gl.setAttribute("y2",gy);
    gl.setAttribute("stroke","#3ecf8e");gl.setAttribute("stroke-dasharray","5,4");gl.setAttribute("opacity",".25");s.appendChild(gl);
  }
  const defs=document.createElementNS("http://www.w3.org/2000/svg","defs");s.appendChild(defs);
  keys.forEach((k,ki)=>{
    const pts=data.map((d,i)=>({x:pl+xs(i),y:pt+ys(d[k]||0)}));
    const gid=`g${ki}${Math.random().toString(36).slice(2,5)}`;
    const grad=document.createElementNS("http://www.w3.org/2000/svg","linearGradient");
    grad.setAttribute("id",gid);grad.setAttribute("x1","0");grad.setAttribute("y1","0");grad.setAttribute("x2","0");grad.setAttribute("y2","1");
    [[0,"0.15"],[1,"0"]].forEach(([o,op])=>{const st=document.createElementNS("http://www.w3.org/2000/svg","stop");st.setAttribute("offset",o===0?"0%":"100%");st.setAttribute("stop-color",colors[ki]);st.setAttribute("stop-opacity",op);grad.appendChild(st)});
    defs.appendChild(grad);
    const area=document.createElementNS("http://www.w3.org/2000/svg","path");
    let ap=`M ${pts[0].x} ${pt+ch}`;pts.forEach(p=>ap+=` L ${p.x} ${p.y}`);ap+=` L ${pts[pts.length-1].x} ${pt+ch} Z`;
    area.setAttribute("d",ap);area.setAttribute("fill",`url(#${gid})`);s.appendChild(area);
    const line=document.createElementNS("http://www.w3.org/2000/svg","path");
    let lp=`M ${pts[0].x} ${pts[0].y}`;
    for(let i=1;i<pts.length;i++){const mx=(pts[i-1].x+pts[i].x)/2;lp+=` C ${mx} ${pts[i-1].y},${mx} ${pts[i].y},${pts[i].x} ${pts[i].y}`}
    line.setAttribute("d",lp);line.setAttribute("fill","none");line.setAttribute("stroke",colors[ki]);line.setAttribute("stroke-width","2");line.setAttribute("stroke-linecap","round");s.appendChild(line);
    const last=pts[pts.length-1];
    const dot=document.createElementNS("http://www.w3.org/2000/svg","circle");
    dot.setAttribute("cx",last.x);dot.setAttribute("cy",last.y);dot.setAttribute("r","3.5");dot.setAttribute("fill",colors[ki]);dot.setAttribute("stroke","#0e0e11");dot.setAttribute("stroke-width","2");s.appendChild(dot);
  });
  const step=Math.ceil(data.length/6);
  data.forEach((d,i)=>{
    if(i%step!==0&&i!==data.length-1)return;
    const t=document.createElementNS("http://www.w3.org/2000/svg","text");
    t.setAttribute("x",pl+xs(i));t.setAttribute("y",H-5);t.setAttribute("text-anchor","middle");
    t.setAttribute("fill","#6b6b80");t.setAttribute("font-size","8.5");t.setAttribute("font-family","Inter,sans-serif");
    t.textContent=d.label;s.appendChild(t);
  });
  return s;
}

function svgBar(data,keys,colors,W=740,H=125){
  const pl=42,pr=10,pt=10,pb=24,cw=W-pl-pr,ch=H-pt-pb;
  const allV=data.flatMap(d=>keys.map(k=>d[k]||0));
  const maxV=Math.max(...allV)*1.15||100;
  const bw=Math.min(18,(cw/data.length)/(keys.length+.8));
  const s=document.createElementNS("http://www.w3.org/2000/svg","svg");
  s.setAttribute("width","100%");s.setAttribute("viewBox",`0 0 ${W} ${H}`);
  const defs=document.createElementNS("http://www.w3.org/2000/svg","defs");s.appendChild(defs);
  const bl=document.createElementNS("http://www.w3.org/2000/svg","line");
  bl.setAttribute("x1",pl);bl.setAttribute("x2",pl+cw);bl.setAttribute("y1",pt+ch);bl.setAttribute("y2",pt+ch);bl.setAttribute("stroke","#1e1e26");s.appendChild(bl);
  data.forEach((d,i)=>{
    const gw=cw/data.length,gx=pl+gw*i+(gw-bw*keys.length-2*(keys.length-1))/2;
    keys.forEach((k,ki)=>{
      const v=d[k]||0,bh=(v/maxV)*ch;
      const gid=`b${ki}_${i}`;
      const grad=document.createElementNS("http://www.w3.org/2000/svg","linearGradient");
      grad.setAttribute("id",gid);grad.setAttribute("x1","0");grad.setAttribute("y1","0");grad.setAttribute("x2","0");grad.setAttribute("y2","1");
      [[0,"0.85"],[1,"0.3"]].forEach(([o,op])=>{const st=document.createElementNS("http://www.w3.org/2000/svg","stop");st.setAttribute("offset",o===0?"0%":"100%");st.setAttribute("stop-color",colors[ki]);st.setAttribute("stop-opacity",op);grad.appendChild(st)});
      defs.appendChild(grad);
      const r=document.createElementNS("http://www.w3.org/2000/svg","rect");
      r.setAttribute("x",gx+ki*(bw+2));r.setAttribute("y",pt+ch-bh);r.setAttribute("width",bw);r.setAttribute("height",Math.max(bh,0));r.setAttribute("fill",`url(#${gid})`);r.setAttribute("rx","2");s.appendChild(r);
    });
    const t=document.createElementNS("http://www.w3.org/2000/svg","text");
    t.setAttribute("x",pl+gw*i+gw/2);t.setAttribute("y",H-5);t.setAttribute("text-anchor","middle");
    t.setAttribute("fill","#6b6b80");t.setAttribute("font-size","7.5");t.setAttribute("font-family","Inter,sans-serif");
    t.textContent=d.label;s.appendChild(t);
  });
  return s;
}

  });

async function toggleTask(goalId,task,total){
  const g=goals.find(x=>x.id===goalId);if(!g)return;
  if(g.tasksDone.includes(task))g.tasksDone=g.tasksDone.filter(t=>t!==task);else g.tasksDone=[...g.tasksDone,task];
  g.unlocked=isUnlocked(g,total);
  await sbG.save({...g,tasks:JSON.stringify(g.tasks),tasksDone:JSON.stringify(g.tasksDone)});
  saveGoals();if(g.unlocked)spawnConfetti();render();
}
