<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TIM & LENA — SPARPLAN 2025.2028</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{
  --void:#020408;
  --deep:#05080f;
  --dark:#080d18;
  --panel:#0a0f1e;
  --panel2:#0d1428;
  --rim:#111d35;
  --line:#162040;
  --line2:#1e2d50;
  --tim:#4d9fff;
  --tim2:#1a5ccc;
  --tim-glow:rgba(77,159,255,0.15);
  --lena:#ff4d8f;
  --lena2:#cc1a5c;
  --lena-glow:rgba(255,77,143,0.15);
  --green:#00ff88;
  --green2:#00cc66;
  --green-glow:rgba(0,255,136,0.12);
  --gold:#ffb800;
  --gold-glow:rgba(255,184,0,0.15);
  --red:#ff3333;
  --text:#c8d8f0;
  --text2:#5a7aaa;
  --text3:#2a3d60;
  --f-hud:'Orbitron',monospace;
  --f-ui:'Rajdhani',sans-serif;
  --f-data:'DM Mono',monospace;
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

body{
  background:var(--void);
  color:var(--text);
  font-family:var(--f-data);
  min-height:100vh;
  overflow-x:hidden;
}

/* SCAN LINE EFFECT */
body::before{
  content:"";
  position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
  pointer-events:none;z-index:9998;
}

/* AMBIENT GLOW */
body::after{
  content:"";
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 20%,rgba(77,159,255,0.04) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 85% 75%,rgba(255,77,143,0.04) 0%,transparent 55%),
    radial-gradient(ellipse 40% 30% at 50% 50%,rgba(0,255,136,0.02) 0%,transparent 50%);
  pointer-events:none;z-index:0;
}

/* ═══════ LAYOUT ═══════ */
#app{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:0 16px 100px}

/* ═══════ ANIMATIONS ═══════ */
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scanDown{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes blink{0%,100%{opacity:1}49%{opacity:1}50%{opacity:0}99%{opacity:0}}
@keyframes floatUp{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-60px);opacity:0}}
@keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(-80px) rotate(540deg);opacity:0}}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 8px var(--tim),0 0 20px var(--tim-glow)}50%{box-shadow:0 0 16px var(--tim),0 0 40px var(--tim-glow)}}
@keyframes glowPulseLena{0%,100%{box-shadow:0 0 8px var(--lena),0 0 20px var(--lena-glow)}50%{box-shadow:0 0 16px var(--lena),0 0 40px var(--lena-glow)}}
@keyframes crownFloat{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-6px) rotate(4deg)}}
@keyframes spinLoader{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes bootBar{from{width:0}to{width:100%}}
@keyframes numRoll{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes cornerBlink{0%,100%{opacity:0.4}50%{opacity:1}}

/* ═══════ HUD HEADER ═══════ */
.hud-header{
  padding:28px 0 0;
  text-align:center;
  position:relative;
  margin-bottom:0;
}

/* Corner decorations */
.corner{position:absolute;width:20px;height:20px}
.corner::before,.corner::after{content:"";position:absolute;background:var(--tim);animation:cornerBlink 2s ease-in-out infinite}
.corner::before{width:100%;height:2px;top:0}
.corner::after{width:2px;height:100%;top:0}
.corner.tl{top:28px;left:0}
.corner.tr{top:28px;right:0;transform:scaleX(-1)}
.corner.bl{bottom:0;left:0;transform:scaleY(-1)}
.corner.br{bottom:0;right:0;transform:scale(-1)}

.hud-eyebrow{
  font-family:var(--f-hud);font-size:9px;font-weight:400;
  letter-spacing:0.4em;color:var(--text3);
  margin-bottom:14px;
}
.hud-title{
  font-family:var(--f-hud);
  font-size:clamp(36px,8vw,72px);
  font-weight:900;
  letter-spacing:0.08em;
  line-height:1;
  margin-bottom:8px;
  position:relative;
  display:inline-block;
}
.hud-title .t{
  color:var(--tim);
  text-shadow:0 0 20px var(--tim),0 0 40px var(--tim-glow);
}
.hud-title .amp{color:var(--text3);font-size:0.5em;font-weight:400;margin:0 8px;vertical-align:middle}
.hud-title .l{
  color:var(--lena);
  text-shadow:0 0 20px var(--lena),0 0 40px var(--lena-glow);
}
.hud-statusbar{
  display:flex;justify-content:center;gap:0;
  font-family:var(--f-hud);font-size:9px;font-weight:400;
  letter-spacing:0.25em;color:var(--text3);
  border-top:1px solid var(--line);border-bottom:1px solid var(--line);
  margin-top:14px;
  overflow:hidden;
}
.hsb-item{padding:8px 20px;border-right:1px solid var(--line)}
.hsb-item:last-child{border-right:none}
.hsb-item.hi{color:var(--green)}
.hsb-item.warn{color:var(--gold)}

/* ═══════ TICKER ═══════ */
.ticker{
  background:var(--panel);
  border-bottom:1px solid var(--line);
  padding:8px 0;overflow:hidden;
  font-family:var(--f-hud);font-size:10px;font-weight:400;letter-spacing:0.15em;
  display:flex;white-space:nowrap;
  margin-bottom:24px;
}
.ticker-inner{display:inline-flex;animation:marquee 28s linear infinite}
.t-item{padding:0 24px;color:var(--text3);border-right:1px solid var(--line)}
.t-item.up{color:var(--green)}
.t-item.dn{color:var(--red)}
.t-item.hi{color:var(--gold)}

/* ═══════ MASTER STATS ═══════ */
.master-grid{
  display:grid;
  grid-template-columns:1.4fr 1fr;
  gap:2px;
  margin-bottom:2px;
}
.panel{
  background:var(--panel);
  border:1px solid var(--line);
  position:relative;
  overflow:hidden;
}
.panel::before{
  content:"";position:absolute;
  top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--tim),transparent);
  opacity:0.4;
}

.main-val-panel{padding:28px 30px}
.mvp-label{
  font-family:var(--f-hud);font-size:9px;font-weight:400;
  letter-spacing:0.4em;color:var(--text3);margin-bottom:10px;
}
.mvp-value{
  font-family:var(--f-hud);
  font-size:clamp(40px,7vw,68px);
  font-weight:900;
  letter-spacing:-0.02em;
  line-height:1;
  margin-bottom:10px;
  background:linear-gradient(135deg,var(--tim),var(--green));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.mvp-sub{font-family:var(--f-data);font-size:11px;color:var(--text3);line-height:1.6}

/* mini progress */
.mini-prog-wrap{margin-top:16px}
.mini-prog-label{display:flex;justify-content:space-between;font-family:var(--f-hud);font-size:9px;letter-spacing:0.2em;color:var(--text3);margin-bottom:6px}
.mini-prog-track{height:6px;background:var(--dark);border:1px solid var(--line);position:relative;overflow:hidden}
.mini-prog-fill{height:100%;background:linear-gradient(90deg,var(--tim),var(--green));transition:width 1.2s cubic-bezier(.4,0,.2,1);position:relative}
.mini-prog-fill::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);animation:marquee 1.5s linear infinite;background-size:200% 100%}

/* side panels */
.side-panels{display:flex;flex-direction:column;gap:2px}
.side-cell{
  flex:1;padding:16px 18px;
  background:var(--panel);border:1px solid var(--line);
  position:relative;overflow:hidden;
}
.side-cell::after{
  content:"";position:absolute;right:0;top:0;bottom:0;width:2px;
}
.side-cell.tim-cell::after{background:linear-gradient(to bottom,transparent,var(--tim),transparent);opacity:0.5}
.side-cell.lena-cell::after{background:linear-gradient(to bottom,transparent,var(--lena),transparent);opacity:0.5}
.side-cell.green-cell::after{background:linear-gradient(to bottom,transparent,var(--green),transparent);opacity:0.5}
.sc-label{font-family:var(--f-hud);font-size:8px;letter-spacing:0.35em;color:var(--text3);margin-bottom:5px}
.sc-val{font-family:var(--f-hud);font-size:clamp(18px,3vw,26px);font-weight:700;line-height:1;letter-spacing:0.02em}
.sc-sub{font-family:var(--f-data);font-size:10px;color:var(--text3);margin-top:3px}

/* ═══════ TIMELINE ═══════ */
.timeline-panel{
  background:var(--panel);border:1px solid var(--line);
  padding:20px 24px;margin-bottom:2px;
  position:relative;overflow:hidden;
}
.timeline-panel::before{
  content:"3Y";position:absolute;
  right:20px;top:50%;transform:translateY(-50%);
  font-family:var(--f-hud);font-size:80px;font-weight:900;
  color:rgba(77,159,255,0.03);line-height:1;pointer-events:none;
}
.tl-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.tl-title{font-family:var(--f-hud);font-size:9px;font-weight:400;letter-spacing:0.35em;color:var(--text3)}
.tl-pct{font-family:var(--f-hud);font-size:13px;font-weight:600;color:var(--tim)}
.tl-track{
  height:28px;background:var(--dark);
  border:1px solid var(--line);
  position:relative;overflow:visible;
}
.tl-fill{
  position:absolute;left:0;top:0;height:100%;
  background:repeating-linear-gradient(90deg,var(--tim2) 0,var(--tim2) 4px,transparent 4px,transparent 12px);
  opacity:0.6;transition:width 1.2s cubic-bezier(.4,0,.2,1);
}
.tl-now{
  position:absolute;top:-4px;bottom:-4px;width:2px;
  background:var(--green);
  box-shadow:0 0 8px var(--green),0 0 16px var(--green-glow);
}
.tl-now-lbl{
  position:absolute;top:-20px;left:50%;transform:translateX(-50%);
  font-family:var(--f-hud);font-size:8px;letter-spacing:0.2em;color:var(--green);
  white-space:nowrap;
  text-shadow:0 0 8px var(--green);
}
.tl-dep-dot{
  position:absolute;top:50%;transform:translate(-50%,-50%);
  width:8px;height:8px;border-radius:50%;
  border:1.5px solid var(--void);
  cursor:default;
}
.tl-years{
  display:flex;justify-content:space-between;
  font-family:var(--f-hud);font-size:9px;letter-spacing:0.15em;
  color:var(--text3);margin-top:8px;
}

/* ═══════ COUNTDOWN ═══════ */
.countdown-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:2px;margin-bottom:2px;
}
.cd-panel{
  background:var(--panel);border:1px solid var(--line);
  padding:20px 8px 24px;text-align:center;
  position:relative;overflow:hidden;
}
.cd-panel::before{
  content:"";position:absolute;bottom:0;left:0;right:0;height:2px;
}
.cd-panel:nth-child(1)::before{background:var(--tim);box-shadow:0 0 8px var(--tim)}
.cd-panel:nth-child(2)::before{background:var(--text3)}
.cd-panel:nth-child(3)::before{background:var(--lena);box-shadow:0 0 8px var(--lena)}
.cd-panel:nth-child(4)::before{background:var(--green);box-shadow:0 0 8px var(--green)}
.cd-num{
  font-family:var(--f-hud);
  font-size:clamp(32px,6vw,52px);
  font-weight:900;letter-spacing:-0.02em;line-height:1;
  margin-bottom:8px;
}
.cd-panel:nth-child(1) .cd-num{color:var(--tim);text-shadow:0 0 16px var(--tim)}
.cd-panel:nth-child(3) .cd-num{color:var(--lena);text-shadow:0 0 16px var(--lena)}
.cd-panel:nth-child(4) .cd-num{color:var(--green);text-shadow:0 0 16px var(--green)}
.cd-label{font-family:var(--f-hud);font-size:8px;letter-spacing:0.3em;color:var(--text3)}

/* ═══════ ADD BUTTON ═══════ */
.add-btn{
  width:100%;padding:15px;
  font-family:var(--f-hud);font-size:12px;font-weight:600;
  letter-spacing:0.3em;
  background:transparent;
  color:var(--tim);
  border:1px solid var(--tim);
  cursor:pointer;
  margin-bottom:2px;
  transition:all 0.2s;
  position:relative;overflow:hidden;
}
.add-btn::before{
  content:"";position:absolute;inset:0;
  background:var(--tim-glow);opacity:0;
  transition:opacity 0.2s;
}
.add-btn:hover::before{opacity:1}
.add-btn:hover{box-shadow:0 0 20px var(--tim-glow),inset 0 0 20px var(--tim-glow)}
.add-btn.open{color:var(--text3);border-color:var(--line);box-shadow:none}
.add-btn.open::before{display:none}

.form-panel{
  background:var(--panel);border:1px solid var(--line2);
  border-top:2px solid var(--tim);
  padding:26px;margin-bottom:2px;
  animation:slideUp 0.25s ease;
}
.form-title{font-family:var(--f-hud);font-size:9px;letter-spacing:0.4em;color:var(--text3);margin-bottom:20px}
.person-row{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-bottom:20px}
.p-btn{
  padding:14px;font-family:var(--f-hud);font-size:16px;font-weight:700;
  letter-spacing:0.15em;border:1px solid var(--line);
  background:var(--dark);color:var(--text3);cursor:pointer;transition:all 0.2s;
}
.p-btn.at{background:var(--tim-glow);color:var(--tim);border-color:var(--tim);box-shadow:0 0 16px var(--tim-glow)}
.p-btn.al{background:var(--lena-glow);color:var(--lena);border-color:var(--lena);box-shadow:0 0 16px var(--lena-glow)}
.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.form-field label{display:block;font-family:var(--f-hud);font-size:8px;letter-spacing:0.3em;color:var(--text3);margin-bottom:6px}
.form-field input,.form-field select{
  width:100%;padding:9px 12px;
  font-family:var(--f-data);font-size:13px;
  background:var(--dark);border:1px solid var(--line2);color:var(--text);
  outline:none;transition:border-color 0.2s;-webkit-appearance:none;
}
.form-field input:focus,.form-field select:focus{border-color:var(--tim);box-shadow:0 0 8px var(--tim-glow)}
.form-field select option{background:var(--dark)}
.save-btn{
  width:100%;padding:13px;
  font-family:var(--f-hud);font-size:12px;font-weight:600;letter-spacing:0.3em;
  border:none;cursor:pointer;color:var(--void);
  transition:all 0.2s;
}

/* ═══════ BATTLE ═══════ */
.battle-panel{
  background:var(--panel);border:1px solid var(--line);
  margin-bottom:2px;position:relative;overflow:hidden;
}
.battle-inner{display:grid;grid-template-columns:1fr auto 1fr}
.bp-side{padding:24px 20px;position:relative}
.bp-side.t-side{border-right:1px solid var(--line)}
.bp-side.l-side{border-left:1px solid var(--line);text-align:right}
.bp-name{font-family:var(--f-hud);font-size:10px;font-weight:600;letter-spacing:0.3em;margin-bottom:8px}
.bp-val{font-family:var(--f-hud);font-size:clamp(28px,5vw,44px);font-weight:900;line-height:1;letter-spacing:-0.01em}
.bp-dep{font-family:var(--f-data);font-size:10px;color:var(--text3);margin-top:5px}
.bp-vs{
  padding:24px 18px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
}
.vs-txt{font-family:var(--f-hud);font-size:10px;font-weight:600;letter-spacing:0.2em;color:var(--text3)}
.crown-el{font-size:20px;animation:crownFloat 2.5s ease-in-out infinite}
.battle-bar-row{
  display:flex;height:12px;
  border-top:1px solid var(--line);
  overflow:hidden;
}
.bb-t{background:linear-gradient(90deg,var(--tim2),var(--tim));transition:width 1s cubic-bezier(.4,0,.2,1);height:100%}
.bb-l{background:linear-gradient(90deg,var(--lena),var(--lena2));transition:width 1s cubic-bezier(.4,0,.2,1);height:100%;margin-left:auto}
.battle-footer{
  padding:8px 20px;border-top:1px solid var(--line);
  font-family:var(--f-hud);font-size:9px;letter-spacing:0.25em;color:var(--text3);
  text-align:center;background:var(--dark);
}

/* ═══════ STREAK ═══════ */
.streak-panel{
  display:grid;grid-template-columns:140px 1fr;
  gap:0;background:var(--panel);border:1px solid var(--line);
  margin-bottom:2px;
}
.streak-left{
  background:var(--dark);
  border-right:1px solid var(--line);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px 10px;text-align:center;
  position:relative;overflow:hidden;
}
.streak-left::before{
  content:"";position:absolute;inset:0;
  background:radial-gradient(circle at center,var(--gold-glow),transparent 70%);
}
.streak-icon{font-size:24px;margin-bottom:6px}
.streak-num{
  font-family:var(--f-hud);font-size:clamp(36px,5vw,52px);font-weight:900;
  line-height:1;color:var(--gold);
  text-shadow:0 0 20px var(--gold),0 0 40px var(--gold-glow);
}
.streak-lbl{font-family:var(--f-hud);font-size:8px;letter-spacing:0.3em;color:var(--text3);margin-top:4px}
.streak-right{padding:22px 24px}
.streak-tag{
  display:inline-flex;align-items:center;gap:6px;
  font-family:var(--f-hud);font-size:9px;letter-spacing:0.2em;color:var(--text3);
  border:1px solid var(--line);padding:4px 10px;margin-bottom:10px;
}
.roast-txt{
  font-family:var(--f-data);font-size:13px;font-style:italic;
  color:var(--text);line-height:1.7;
}

/* ═══════ 4-COLS ═══════ */
.four-cols{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:2px;margin-bottom:2px;
}
.fc-cell{
  background:var(--panel);border:1px solid var(--line);
  padding:16px 14px;
}
.fc-label{font-family:var(--f-hud);font-size:8px;letter-spacing:0.3em;color:var(--text3);margin-bottom:6px}
.fc-val{font-family:var(--f-hud);font-size:clamp(16px,2.5vw,22px);font-weight:700;line-height:1;letter-spacing:0.02em}
.fc-sub{font-family:var(--f-data);font-size:10px;color:var(--text3);margin-top:4px}

/* ═══════ LEISTEN ═══════ */
.leisten-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:2px;margin-bottom:2px;
}
.ls-cell{
  background:var(--panel);border:1px solid var(--line);
  padding:16px 14px;
  transition:border-color 0.2s;
}
.ls-cell:hover{border-color:var(--line2)}
.ls-emoji{font-size:20px;margin-bottom:6px}
.ls-name{font-family:var(--f-hud);font-size:9px;letter-spacing:0.2em;color:var(--text3);margin-bottom:6px}
.ls-count{font-family:var(--f-hud);font-size:clamp(20px,3vw,28px);font-weight:900;line-height:1;letter-spacing:-0.01em}
.ls-bar-track{height:3px;background:var(--dark);border:none;margin:8px 0 4px}
.ls-bar-fill{height:100%;transition:width 1s ease}
.ls-funny{font-family:var(--f-data);font-size:10px;color:var(--text3);font-style:italic;line-height:1.4}

/* ═══════ TAB NAV ═══════ */
.tab-nav{
  display:flex;gap:0;
  border:1px solid var(--line);
  border-bottom:none;
  overflow-x:auto;
  margin-top:24px;
}
.tab-nav::-webkit-scrollbar{height:0}
.tab-btn{
  flex:1;min-width:88px;
  padding:11px 8px;
  font-family:var(--f-hud);font-size:9px;font-weight:500;
  letter-spacing:0.15em;
  border:none;
  background:var(--dark);color:var(--text3);
  cursor:pointer;white-space:nowrap;
  border-right:1px solid var(--line);
  transition:all 0.18s;
}
.tab-btn:last-child{border-right:none}
.tab-btn:hover{background:var(--panel2);color:var(--text)}
.tab-btn.active{
  background:var(--panel);color:var(--tim);
  border-bottom:2px solid var(--tim);
  box-shadow:inset 0 0 16px var(--tim-glow);
}

/* DOM helper */

  const e=document.createElement(tag);

/* Calc */
function calcVal(deps,asOf=new Date()){return deps.reduce((s,d)=>{const dd=new Date(d.year,d.month-1,15);const m=Math.max(0,(asOf.getFullYear()-dd.getFullYear())*12+(asOf.getMonth()-dd.getMonth()));return s+d.amount*Math.pow(1+MR,m);},0);}

/* Charts */
function svgLine(data,keys,colors,W=800,H=220){
  const pl=54,pr=14,pt=14,pb=32,cw=W-pl-pr,ch=H-pt-pb;
  const allV=data.flatMap(d=>keys.map(k=>d[k]||0));
  const maxV=Math.max(...allV)*1.08||100;
  const xs=i=>(i/(data.length-1||1))*cw,ys=v=>ch-(v/maxV)*ch;
  const s=document.createElementNS("http://www.w3.org/2000/svg","svg");
  s.setAttribute("width","100%");s.setAttribute("viewBox",`0 0 ${W} ${H}`);

  for(let i=0;i<=4;i++){
    const y=pt+(ch/4)*i,v=maxV-(maxV/4)*i;
    const l=document.createElementNS("http://www.w3.org/2000/svg","line");
    l.setAttribute("x1",pl);l.setAttribute("x2",pl+cw);l.setAttribute("y1",y);l.setAttribute("y2",y);

    const t=document.createElementNS("http://www.w3.org/2000/svg","text");
    t.setAttribute("x",pl-5);t.setAttribute("y",y+4);t.setAttribute("text-anchor","end");
    t.setAttribute("fill","#2a3d60");t.setAttribute("font-size","9");t.setAttribute("font-family","DM Mono,monospace");
    t.textContent=`€${fmtS(v)}`;s.appendChild(t);
  }

  const gy=pt+ys(GOAL);
  if(gy>pt&&gy<pt+ch){
    const gl=document.createElementNS("http://www.w3.org/2000/svg","line");
    gl.setAttribute("x1",pl);gl.setAttribute("x2",pl+cw);gl.setAttribute("y1",gy);gl.setAttribute("y2",gy);
    gl.setAttribute("stroke","#00ff88");gl.setAttribute("stroke-dasharray","6,4");gl.setAttribute("opacity","0.3");s.appendChild(gl);
    const gt=document.createElementNS("http://www.w3.org/2000/svg","text");
    gt.setAttribute("x",pl+4);gt.setAttribute("y",gy-4);gt.setAttribute("fill","#00ff88");gt.setAttribute("font-size","8");gt.setAttribute("font-family","Orbitron,monospace");gt.setAttribute("opacity","0.5");
    gt.textContent="TARGET";s.appendChild(gt);
  }

  const defs=document.createElementNS("http://www.w3.org/2000/svg","defs");s.appendChild(defs);
  keys.forEach((k,ki)=>{
    const pts=data.map((d,i)=>({x:pl+xs(i),y:pt+ys(d[k]||0)}));
    const gid=`g${ki}${Math.random().toString(36).slice(2,6)}`;
    const grad=document.createElementNS("http://www.w3.org/2000/svg","linearGradient");
    grad.setAttribute("id",gid);grad.setAttribute("x1","0");grad.setAttribute("y1","0");grad.setAttribute("x2","0");grad.setAttribute("y2","1");
    [[0,"0.2"],[1,"0"]].forEach(([off,op])=>{const st=document.createElementNS("http://www.w3.org/2000/svg","stop");st.setAttribute("offset",off===0?"0%":"100%");st.setAttribute("stop-color",colors[ki]);st.setAttribute("stop-opacity",op);grad.appendChild(st);});
    defs.appendChild(grad);
    const area=document.createElementNS("http://www.w3.org/2000/svg","path");
    let ap=`M ${pts[0].x} ${pt+ch}`;pts.forEach(p=>ap+=` L ${p.x} ${p.y}`);ap+=` L ${pts[pts.length-1].x} ${pt+ch} Z`;
    area.setAttribute("d",ap);area.setAttribute("fill",`url(#${gid})`);s.appendChild(area);
    const line=document.createElementNS("http://www.w3.org/2000/svg","path");
    let lp=`M ${pts[0].x} ${pts[0].y}`;
    for(let i=1;i<pts.length;i++){const mx=(pts[i-1].x+pts[i].x)/2;lp+=` C ${mx} ${pts[i-1].y},${mx} ${pts[i].y},${pts[i].x} ${pts[i].y}`}
    line.setAttribute("d",lp);line.setAttribute("fill","none");line.setAttribute("stroke",colors[ki]);line.setAttribute("stroke-width","1.8");line.setAttribute("stroke-linecap","round");s.appendChild(line);
    const last=pts[pts.length-1];
    const dot=document.createElementNS("http://www.w3.org/2000/svg","circle");
    dot.setAttribute("cx",last.x);dot.setAttribute("cy",last.y);dot.setAttribute("r","4");dot.setAttribute("fill",colors[ki]);dot.setAttribute("stroke","#020408");dot.setAttribute("stroke-width","2");
    // glow
    const glow=document.createElementNS("http://www.w3.org/2000/svg","circle");
    glow.setAttribute("cx",last.x);glow.setAttribute("cy",last.y);glow.setAttribute("r","8");glow.setAttribute("fill",colors[ki]);glow.setAttribute("opacity","0.15");
    s.appendChild(glow);s.appendChild(dot);
  });

  const step=Math.ceil(data.length/6);
  data.forEach((d,i)=>{
    if(i%step!==0&&i!==data.length-1)return;
    const t=document.createElementNS("http://www.w3.org/2000/svg","text");
    t.setAttribute("x",pl+xs(i));t.setAttribute("y",H-8);t.setAttribute("text-anchor","middle");
    t.setAttribute("fill","#2a3d60");t.setAttribute("font-size","8");t.setAttribute("font-family","DM Mono,monospace");
    t.textContent=d.label;s.appendChild(t);
  });
  return s;
}

function svgBar(data,keys,colors,W=800,H=140){
  const pl=44,pr=10,pt=10,pb=28,cw=W-pl-pr,ch=H-pt-pb;
  const allV=data.flatMap(d=>keys.map(k=>d[k]||0));
  const maxV=Math.max(...allV)*1.12||100;
  const bw=Math.min(22,(cw/data.length)/(keys.length+0.8));
  const s=document.createElementNS("http://www.w3.org/2000/svg","svg");
  s.setAttribute("width","100%");s.setAttribute("viewBox",`0 0 ${W} ${H}`);
  const defs=document.createElementNS("http://www.w3.org/2000/svg","defs");s.appendChild(defs);
  const bl=document.createElementNS("http://www.w3.org/2000/svg","line");
  bl.setAttribute("x1",pl);bl.setAttribute("x2",pl+cw);bl.setAttribute("y1",pt+ch);bl.setAttribute("y2",pt+ch);bl.setAttribute("stroke","#162040");s.appendChild(bl);
  data.forEach((d,i)=>{
    const gw=cw/data.length,gx=pl+gw*i+(gw-bw*keys.length-2*(keys.length-1))/2;
    keys.forEach((k,ki)=>{
      const v=d[k]||0,bh=(v/maxV)*ch;
      const gid=`bg${ki}_${i}`;
      const grad=document.createElementNS("http://www.w3.org/2000/svg","linearGradient");
      grad.setAttribute("id",gid);grad.setAttribute("x1","0");grad.setAttribute("y1","0");grad.setAttribute("x2","0");grad.setAttribute("y2","1");
      [[0,"0.9"],[1,"0.4"]].forEach(([off,op])=>{const st=document.createElementNS("http://www.w3.org/2000/svg","stop");st.setAttribute("offset",off===0?"0%":"100%");st.setAttribute("stop-color",colors[ki]);st.setAttribute("stop-opacity",op);grad.appendChild(st);});
      defs.appendChild(grad);
      const r=document.createElementNS("http://www.w3.org/2000/svg","rect");
      r.setAttribute("x",gx+ki*(bw+2));r.setAttribute("y",pt+ch-bh);r.setAttribute("width",bw);r.setAttribute("height",Math.max(bh,0));r.setAttribute("fill",`url(#${gid})`);s.appendChild(r);
    });
    const t=document.createElementNS("http://www.w3.org/2000/svg","text");
    t.setAttribute("x",pl+gw*i+gw/2);t.setAttribute("y",H-8);t.setAttribute("text-anchor","middle");
    t.setAttribute("fill","#2a3d60");t.setAttribute("font-size","7.5");t.setAttribute("font-family","DM Mono,monospace");
    t.textContent=d.label;s.appendChild(t);
  });
  return s;
}

async function toggleTask(goalId,task,total){
  const g=goals.find(x=>x.id===goalId);if(!g)return;
  if(g.tasksDone.includes(task))g.tasksDone=g.tasksDone.filter(t=>t!==task);
  else g.tasksDone=[...g.tasksDone,task];
  g.unlocked=isUnlocked(g,total);
  await sbG.save({...g,tasks:JSON.stringify(g.tasks),tasksDone:JSON.stringify(g.tasksDone)});
  saveGoals();if(g.unlocked)spawnConfetti();render();
}

      const tl2=h("div",{class:"act-list"});
      todo.forEach((a,idx)=>{
        const isPicked=pickedAct?.id===a.id;
        const row=h("div",{class:"act-item",style:{background:isPicked?"rgba(77,159,255,0.06)":"",borderLeft:isPicked?"2px solid var(--tim)":"2px solid transparent"}});
        row.appendChild(h("div",{class:"act-idx"},String(idx+1).padStart(2,"0")));
        row.appendChild(h("div",{style:{flex:"1"}},a.name));
        if(isPicked)row.appendChild(h("div",{style:{fontFamily:"var(--f-hud)",fontSize:"9px",letterSpacing:"0.1em",color:"var(--tim)"}},"◈ JETZT"));
        row.appendChild(h("button",{class:"btn",style:{background:"transparent",color:"var(--text3)",fontSize:"13px",padding:"2px 6px",border:"none"},onclick:async(e)=>{e.stopPropagation();await sbA.del(a.id);activities=activities.filter(x=>x.id!==a.id);saveActs();if(pickedAct?.id===a.id)pickedAct=null;render()}},"×"));
        tl2.appendChild(row);
      });tc.appendChild(tl2);
    }
    if(done.length){
      tc.appendChild(h("div",{style:{fontFamily:"var(--f-hud)",fontSize:"9px",letterSpacing:"0.3em",color:"var(--text3)",margin:"14px 0 6px"}},`// ERLEDIGT — ${done.length}`));
      const dl=h("div",{class:"act-list"});
      done.forEach(a=>{
        const row=h("div",{class:"act-item done-i"});
        row.appendChild(h("div",{class:"act-idx",style:{color:"var(--green)"}},"✓"));
        row.appendChild(h("div",{style:{flex:"1",textDecoration:"line-through"}},a.name));
        if(a.doneAt)row.appendChild(h("div",{style:{fontFamily:"var(--f-data)",fontSize:"10px",color:"var(--text3)"}},a.doneAt));
        row.appendChild(h("button",{class:"btn",style:{background:"transparent",color:"var(--text3)",fontSize:"11px",padding:"2px 8px",border:"none"},onclick:async()=>{a.done=false;a.doneAt=null;await sbA.save(a);saveActs();render()}},"↩"));
        dl.appendChild(row);
      });tc.appendChild(dl);
    }
  }

  /* VERLAUF */
  if(tab==="verlauf"){
    if(!deps.length){
      tc.appendChild(h("div",{style:{padding:"50px",textAlign:"center",fontFamily:"var(--f-hud)",fontSize:"12px",letterSpacing:"0.25em",color:"var(--text3)"}},"// KEINE EINZAHLUNGEN VORHANDEN"));
    } else {
      const byYear={};deps.forEach(d=>{if(!byYear[d.year])byYear[d.year]=[];byYear[d.year].push(d)});
      Object.keys(byYear).sort((a,b)=>b-a).forEach(yr=>{
        tc.appendChild(h("div",{class:"hist-year"},`// ${yr} · TOTAL: €${byYear[yr].reduce((s,d)=>s+d.amount,0).toLocaleString("de-DE",{minimumFractionDigits:2,maximumFractionDigits:2})}`));
        byYear[yr].sort((a,b)=>b.month-a.month).forEach(d=>{
          const row=h("div",{class:"hist-row"});
          row.appendChild(h("div",{style:{display:"flex",gap:"14px",alignItems:"center",flexWrap:"wrap"}},
            h("div",{class:"hist-person",style:{color:COL[d.person]}},d.person.toUpperCase()),
            h("div",{style:{fontFamily:"var(--f-data)",fontSize:"11px",color:"var(--text3)"}},`${MO[d.month-1]} ${d.year}`),
            d.note?h("div",{style:{fontFamily:"var(--f-data)",fontSize:"11px",color:"var(--text3)"}},`"${d.note}"`):null
          ));
          row.appendChild(h("div",{style:{display:"flex",gap:"12px",alignItems:"center"}},
            h("div",{class:"hist-amount"},`€${fmt(d.amount)}`),
            h("button",{class:"btn btn-red",style:{fontSize:"10px",padding:"4px 8px"},onclick:()=>{delId=d.id;render()}},"×")
          ));
          tc.appendChild(row);
        });
      });
    }
  }

  wrap.appendChild(tc);

  /* MODALS */
  const modal=(icon,title,sub,onOk)=>wrap.appendChild(h("div",{class:"modal-bg",onclick:e=>{if(e.target===e.currentTarget){delId=null;goalDelId=null;render()}}},h("div",{class:"modal"},h("span",{class:"modal-icon"},icon),h("div",{class:"modal-title"},title),h("div",{class:"modal-sub"},sub),h("div",{class:"modal-btns"},h("button",{class:"btn btn-ghost",style:{padding:"11px"}},h("span",{onclick:()=>{delId=null;goalDelId=null;render()}},"NEIN")),h("button",{class:"btn btn-red",style:{padding:"11px"},onclick:onOk},"LÖSCHEN")))));
  if(delId)modal("×","EINZAHLUNG LÖSCHEN?","Diese Einzahlung wird dauerhaft entfernt.",async()=>{await sb.del(delId);deps=deps.filter(d=>d.id!==delId);delId=null;render()});
  if(goalDelId)modal("×","ZIEL LÖSCHEN?","Das Reiseziel wird dauerhaft gelöscht.",async()=>{await sbG.del(goalDelId);goals=goals.filter(g=>g.id!==goalDelId);saveGoals();goalDelId=null;render()});
}

/* INIT */
document.body.innerHTML=`<div class="loading-wrap"><div class="loader"></div><div style="font-family:'Orbitron',monospace;font-size:9px;letter-spacing:0.4em;color:#2a3d60;margin-top:4px">SYSTEM BOOT…</div></div>`;
Promise.all([sb.all(),loadGoals(),loadActivities()]).then(([d])=>{deps=d||[];loading=false;document.body.innerHTML=`<div id="app"></div>`;render();}).catch(e=>{document.body.innerHTML=`<div style="padding:24px;font-family:monospace;font-size:12px;color:#ff3333">ERROR: ${e.message}</div>`;});
</script>
</body>
</html>
